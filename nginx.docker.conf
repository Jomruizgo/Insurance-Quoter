server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse proxy to backend quoter — strips /api prefix before forwarding
    location /api/ {
        proxy_pass http://backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Reverse proxy to backend core — strips /api-core prefix before forwarding
    location /api-core/ {
        proxy_pass http://core:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # index.html — no cache so users always get the latest version
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # config.json — no cache so it can be swapped per environment
    location = /assets/config.json {
        add_header Cache-Control "no-store";
    }

    # Hashed assets — cache for 1 year (content-addressed, safe to cache forever)
    location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — unknown routes return index.html so Angular Router handles them
    location / {
        try_files $uri $uri/ /index.html;
    }
}

networks:
  sofka-net:
    driver: bridge

services:

  # --- PostgreSQL for plataforma-danos-back (:5432) ---
  db-back:
    image: postgres:16
    env_file:
      - ./Insurance-Quoter-Back/.env
    ports:
      - "5432:5432"
    networks:
      - sofka-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --- PostgreSQL for plataforma-core-ohs (:5433) ---
  db-core:
    image: postgres:16
    env_file:
      - ./Insurance-Quoter-Core/.env
    ports:
      - "5433:5432"
    networks:
      - sofka-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --- Backend core (plataforma-core-ohs) — port 8081 ---
  core:
    build:
      context: ./Insurance-Quoter-Core
    ports:
      - "8081:8081"
    networks:
      - sofka-net
    env_file:
      - ./Insurance-Quoter-Core/.env
    environment:
      - DB_URL=${CORE_DB_URL}
    depends_on:
      db-core:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/v3/api-docs > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # --- Backend quoter (plataforma-danos-back) — port 8080 ---
  backend:
    build:
      context: ./Insurance-Quoter-Back
    ports:
      - "8080:8080"
    networks:
      - sofka-net
    env_file:
      - ./Insurance-Quoter-Back/.env
    environment:
      - DB_HOST=${BACK_DB_HOST}
      - DB_PORT=${BACK_DB_PORT}
      - CORE_SERVICE_BASE_URL=${CORE_SERVICE_BASE_URL}
    depends_on:
      db-back:
        condition: service_healthy
      core:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/v3/api-docs > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # --- Frontend production (nginx + reverse proxy to backend/core) ---
  frontend:
    build:
      context: ./Insurance-Quoter-Front
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    networks:
      - sofka-net
    depends_on:
      backend:
        condition: service_healthy
      core:
        condition: service_healthy

  # --- Frontend development (ng serve — use localhost:8080/8081 defaults) ---
  frontend-dev:
    build:
      context: ./Insurance-Quoter-Front
      dockerfile: Dockerfile.dev
    ports:
      - "4201:4200"
    volumes:
      - ./Insurance-Quoter-Front/src:/app/src:delegated
    networks:
      - sofka-net

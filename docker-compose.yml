networks:
  sofka-net:
    driver: bridge

services:

  # --- PostgreSQL for plataforma-danos-back (:5432) ---
  db-back:
    image: postgres:16
    environment:
      POSTGRES_DB: ${BACK_DB_NAME}
      POSTGRES_USER: ${BACK_DB_USER}
      POSTGRES_PASSWORD: ${BACK_DB_PASSWORD}
    ports:
      - "5432:5432"
    networks:
      - sofka-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --- PostgreSQL for plataforma-core-ohs (:5433) ---
  db-core:
    image: postgres:16
    environment:
      POSTGRES_DB: ${CORE_DB_NAME}
      POSTGRES_USER: ${CORE_DB_USER}
      POSTGRES_PASSWORD: ${CORE_DB_PASSWORD}
    ports:
      - "5433:5432"
    networks:
      - sofka-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --- Backend core (plataforma-core-ohs) — port 8081 ---
  core:
    build:
      context: .
      dockerfile: Dockerfile.core
    ports:
      - "8081:8081"
    networks:
      - sofka-net
    environment:
      DB_URL: ${CORE_DB_URL}
      DB_USERNAME: ${CORE_DB_USER}
      DB_PASSWORD: ${CORE_DB_PASSWORD}
    depends_on:
      db-core:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/v3/api-docs > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # --- Backend quoter (plataforma-danos-back) — port 8080 ---
  backend:
    build:
      context: .
      dockerfile: Dockerfile.back
    ports:
      - "8080:8080"
    networks:
      - sofka-net
    environment:
      DB_HOST: ${BACK_DB_HOST}
      DB_PORT: ${BACK_DB_PORT}
      DB_NAME: ${BACK_DB_NAME}
      DB_USERNAME: ${BACK_DB_USER}
      DB_PASSWORD: ${BACK_DB_PASSWORD}
      CORE_SERVICE_BASE_URL: ${CORE_SERVICE_BASE_URL}
    depends_on:
      db-back:
        condition: service_healthy
      core:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/v3/api-docs > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # --- Frontend production (nginx + reverse proxy to backend/core) ---
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.front
    ports:
      - "4200:80"
    networks:
      - sofka-net
    depends_on:
      backend:
        condition: service_healthy
      core:
        condition: service_healthy
